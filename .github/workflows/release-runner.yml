name: Release Histatu Runner

# Builds the Windows companion app (HistatuRunner.exe) with Nuitka and attaches
# it to a GitHub Release. Publish a build by pushing a tag like `v1.0.0`:
#
#     git tag v1.0.0 && git push origin v1.0.0
#
# Or run it manually from the Actions tab (workflow_dispatch) to get the exe as a
# downloadable artifact without cutting a release.
#
# The exe is UNSIGNED (no paid code-signing cert), so first-run SmartScreen shows
# "Windows protected your PC" -> users click "More info" -> "Run anyway".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion/histatu-capture
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade nuitka pillow winsdk ordered-set zstandard

      - name: Refresh icon
        run: python make_icon.py

      - name: Build HistatuRunner (standalone folder)
        shell: bash
        run: |
          # single source of truth: the __version__ string in the app
          VER=$(grep -oE '__version__ = "[0-9]+\.[0-9]+\.[0-9]+"' histatu_runner.py | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Building version $VER"
          # --standalone (a folder of the exe + its DLLs), NOT --onefile: the onefile
          # bootstrap unpacks a payload to temp at runtime, which is a top antivirus
          # false-positive trigger. Shipped as a zip; users unzip and run the exe inside.
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --enable-plugin=tk-inter \
            --windows-console-mode=disable \
            --include-package=winsdk \
            --include-package-data=winsdk \
            --windows-icon-from-ico=icon.ico \
            --company-name=Histatu \
            --product-name="Histatu Runner" \
            --file-description="Histatu dungeon runner overlay for Hytale" \
            --file-version="${VER}.0" \
            --product-version="$VER" \
            --output-filename="HistatuRunner.exe" \
            --output-dir=build \
            histatu_runner.py

      - name: Package the Windows zip
        shell: pwsh
        run: |
          # Nuitka standalone writes build/histatu_runner.dist/ — rename to a friendly
          # top folder so the zip unpacks to HistatuRunner/HistatuRunner.exe
          if (-not (Test-Path build/histatu_runner.dist/HistatuRunner.exe)) { throw "exe missing in dist" }
          if (Test-Path build/HistatuRunner) { Remove-Item build/HistatuRunner -Recurse -Force }
          Rename-Item build/histatu_runner.dist -NewName HistatuRunner
          Compress-Archive -Path build/HistatuRunner -DestinationPath build/HistatuRunner-windows.zip -Force
          $z = (Get-Item build/HistatuRunner-windows.zip).Length
          Write-Host "HistatuRunner-windows.zip is $z bytes"
          if ($z -lt 5000000) { throw "zip suspiciously small" }

      - name: Package Linux source zip
        shell: pwsh
        run: |
          # Linux users run from source (see run.sh) — ship just the runner files as one
          # tidy zip. Served to users via the site's /api/download endpoint.
          $files = @("histatu_runner.py","run.sh","README.md","make_icon.py","test_runner.py","icon.png") |
            Where-Object { Test-Path $_ }
          Compress-Archive -Path $files -DestinationPath build/HistatuRunner-linux-src.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HistatuRunner-windows
          path: |
            companion/histatu-capture/build/HistatuRunner-windows.zip
            companion/histatu-capture/build/HistatuRunner-linux-src.zip

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            companion/histatu-capture/build/HistatuRunner-windows.zip
            companion/histatu-capture/build/HistatuRunner-linux-src.zip
          generate_release_notes: true
